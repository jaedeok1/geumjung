<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="엔진 정비 정밀 도해">
  <defs>
    <linearGradient id="e-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16263f"/><stop offset="0.65" stop-color="#0a0e14"/><stop offset="1" stop-color="#060708"/>
    </linearGradient>
    <radialGradient id="e-glow" cx="0.5" cy="0.52" r="0.5">
      <stop offset="0" stop-color="#1c69d4" stop-opacity="0.28"/><stop offset="1" stop-color="#1c69d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="e-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6470"/><stop offset="1" stop-color="#1b2027"/>
    </linearGradient>
    <linearGradient id="e-metal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a424e"/><stop offset="1" stop-color="#13171d"/>
    </linearGradient>
  </defs>

  <rect width="480" height="270" fill="url(#e-bg)"/>
  <ellipse cx="238" cy="150" rx="150" ry="100" fill="url(#e-glow)"/>

  <!-- 정밀 그리드 -->
  <g stroke="#9fb4d6" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 30H480M0 60H480M0 90H480M0 120H480M0 150H480M0 180H480M0 210H480M0 240H480"/>
    <path d="M30 0V270M60 0V270M90 0V270M120 0V270M150 0V270M180 0V270M210 0V270M240 0V270M270 0V270M300 0V270M330 0V270M360 0V270M390 0V270M420 0V270M450 0V270"/>
  </g>
  <!-- 코너 마킹 -->
  <g stroke="#7e8794" stroke-width="1.5" fill="none">
    <path d="M16 30 V16 H30 M450 16 H464 V30 M464 240 V254 H450 M30 254 H16 V240"/>
  </g>

  <!-- 엔진 조립 도해 -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- 오일팬 -->
    <path d="M182 214 H300 L288 236 H194 Z" fill="url(#e-metal2)" stroke="#8b95a3" stroke-width="2"/>
    <!-- 블록 -->
    <rect x="176" y="166" width="132" height="48" fill="url(#e-metal)" stroke="#aab4c2" stroke-width="2.5"/>
    <!-- 냉각 핀 -->
    <g stroke="#59636f" stroke-width="1.5" opacity="0.8">
      <path d="M186 174 H298 M186 184 H298 M186 194 H298 M186 204 H298"/>
    </g>
    <!-- 헤드 -->
    <rect x="182" y="152" width="120" height="16" fill="url(#e-metal2)" stroke="#aab4c2" stroke-width="2"/>
    <!-- 밸브 커버 -->
    <path d="M192 152 V132 Q192 124 200 124 H286 Q294 124 294 132 V152 Z" fill="url(#e-metal)" stroke="#c3ccd8" stroke-width="2.5"/>
    <g stroke="#59636f" stroke-width="2"><path d="M210 128 V150 M228 128 V150 M246 128 V150 M264 128 V150 M282 128 V150"/></g>
    <!-- 헤드 볼트 -->
    <g fill="#0e1218" stroke="#8b95a3" stroke-width="1.5">
      <circle cx="190" cy="160" r="3.2"/><circle cx="222" cy="160" r="3.2"/><circle cx="254" cy="160" r="3.2"/><circle cx="286" cy="160" r="3.2"/>
    </g>

    <!-- 흡기 매니폴드 (좌측) -->
    <g fill="none" stroke="#8b95a3" stroke-width="3">
      <path d="M176 176 C150 172 138 160 138 146"/>
      <path d="M176 188 C142 186 130 176 130 162"/>
      <path d="M176 200 C136 200 124 192 124 180"/>
    </g>
    <rect x="112" y="140" width="18" height="48" rx="3" fill="url(#e-metal2)" stroke="#aab4c2" stroke-width="2"/>

    <!-- 벨트/풀리 (우측) -->
    <circle cx="322" cy="196" r="20" fill="#12161c" stroke="#c3ccd8" stroke-width="3"/>
    <circle cx="322" cy="196" r="7" fill="none" stroke="#7e8794" stroke-width="2"/>
    <circle cx="324" cy="158" r="11" fill="#12161c" stroke="#c3ccd8" stroke-width="2.5"/>
    <path d="M308 182 Q300 176 314 150 M336 182 Q346 176 334 152" fill="none" stroke="#59636f" stroke-width="2.5"/>

    <!-- M 레드 포인트: 오일 드롭 -->
    <path d="M146 214 c0 8 -12 12 -12 22 a6 6 0 0 0 12 0 c0 -10 -12 -14 -12 -22 z" fill="#e22718"/>
  </g>

  <!-- 치수선 -->
  <g stroke="#1c69d4" stroke-width="1.4" opacity="0.75">
    <path d="M176 250 H308"/><path d="M176 246 V254 M308 246 V254"/>
  </g>
</svg>
